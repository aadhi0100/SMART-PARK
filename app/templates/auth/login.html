<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login — SmartPark</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={darkMode:'class'}</script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <style>
        .fade-in{animation:fadeIn .5s ease}
        @keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
        .float{animation:float 6s ease-in-out infinite}
        @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
        .input-field:focus{outline:none;border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.15)}
    </style>
</head>
<body class="bg-slate-100 dark:bg-slate-900 min-h-screen" id="body">
<div class="min-h-screen flex">
    <!-- Left panel -->
    <div class="hidden lg:flex lg:w-1/2 bg-gradient-to-br from-blue-600 via-blue-700 to-indigo-800 relative overflow-hidden flex-col items-center justify-center p-12">
        <div class="absolute inset-0 opacity-10">
            <div class="absolute top-10 left-10 w-64 h-64 bg-white rounded-full blur-3xl"></div>
            <div class="absolute bottom-10 right-10 w-80 h-80 bg-indigo-300 rounded-full blur-3xl"></div>
        </div>
        <div class="relative z-10 text-center text-white">
            <div class="float mb-8">
                <div class="w-28 h-28 bg-white/20 backdrop-blur rounded-3xl flex items-center justify-center mx-auto shadow-2xl">
                    <i class="fa-solid fa-square-parking text-6xl text-white"></i>
                </div>
            </div>
            <h1 class="text-4xl font-bold mb-4">SmartPark</h1>
            <p class="text-blue-100 text-lg mb-8">Intelligent Parking Management System</p>
            <div class="grid grid-cols-3 gap-4 text-center">
                <div class="bg-white/10 backdrop-blur rounded-2xl p-4">
                    <div class="text-2xl font-bold">200</div>
                    <div class="text-blue-200 text-sm">Slots</div>
                </div>
                <div class="bg-white/10 backdrop-blur rounded-2xl p-4">
                    <div class="text-2xl font-bold">20</div>
                    <div class="text-blue-200 text-sm">Locations</div>
                </div>
                <div class="bg-white/10 backdrop-blur rounded-2xl p-4">
                    <div class="text-2xl font-bold">24/7</div>
                    <div class="text-blue-200 text-sm">Service</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Right panel -->
    <div class="w-full lg:w-1/2 flex items-center justify-center p-8 bg-white dark:bg-slate-800">
        <div class="w-full max-w-md fade-in">
            <!-- Mobile logo -->
            <div class="lg:hidden flex items-center justify-center gap-3 mb-8">
                <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-blue-700 rounded-xl flex items-center justify-center">
                    <i class="fa-solid fa-square-parking text-white text-xl"></i>
                </div>
                <span class="text-2xl font-bold text-slate-800 dark:text-white">SmartPark</span>
            </div>

            <div class="flex items-center justify-between mb-8">
                <div>
                    <h2 class="text-3xl font-bold text-slate-800 dark:text-white">Welcome back</h2>
                    <p class="text-slate-500 dark:text-slate-400 mt-1">Sign in to your account</p>
                </div>
                <button onclick="toggleDark()" class="p-2 rounded-xl bg-slate-100 dark:bg-slate-700 text-slate-500 dark:text-slate-400 hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors">
                    <i class="fa-solid fa-moon dark:hidden"></i>
                    <i class="fa-solid fa-sun hidden dark:block text-yellow-400"></i>
                </button>
            </div>

            {% if message %}
            <div class="flex items-center gap-3 p-4 bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-xl mb-6 text-red-700 dark:text-red-400 text-sm">
                <i class="fa-solid fa-circle-exclamation flex-shrink-0"></i>
                <span>{{ message }}</span>
            </div>
            {% endif %}

            <form method="POST" class="space-y-5">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Username</label>
                    <div class="relative">
                        <i class="fa-solid fa-user absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                        <input type="text" name="username" placeholder="Enter your username" required
                            class="input-field w-full pl-11 pr-4 py-3.5 bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-xl text-slate-800 dark:text-white placeholder-slate-400 transition-all text-sm">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Password</label>
                    <div class="relative">
                        <i class="fa-solid fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                        <input type="password" name="password" id="pw" placeholder="Enter your password" required
                            class="input-field w-full pl-11 pr-12 py-3.5 bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-xl text-slate-800 dark:text-white placeholder-slate-400 transition-all text-sm">
                        <button type="button" onclick="togglePw()" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200">
                            <i class="fa-solid fa-eye" id="pw-eye"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="w-full py-3.5 bg-gradient-to-r from-blue-600 to-blue-700 hover:from-blue-700 hover:to-blue-800 text-white font-semibold rounded-xl transition-all duration-200 shadow-lg shadow-blue-500/25 hover:shadow-blue-500/40 hover:-translate-y-0.5 active:translate-y-0">
                    <i class="fa-solid fa-right-to-bracket mr-2"></i>Sign In
                </button>
            </form>

            <!-- Divider -->
            <div class="flex items-center gap-3 my-5">
                <div class="flex-1 h-px bg-slate-200 dark:bg-slate-600"></div>
                <span class="text-xs text-slate-400 font-medium">OR</span>
                <div class="flex-1 h-px bg-slate-200 dark:bg-slate-600"></div>
            </div>

            <!-- Google Sign-In -->
            <a href="{{ url_for('oauth.google_login') }}"
               class="flex items-center justify-center gap-3 w-full py-3.5 bg-white dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-xl text-slate-700 dark:text-slate-200 font-semibold text-sm hover:bg-slate-50 dark:hover:bg-slate-600 transition-all hover:-translate-y-0.5 shadow-sm">
                <svg class="w-5 h-5" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                Continue with Google
            </a>

            <div class="mt-5 p-4 bg-slate-50 dark:bg-slate-700/50 rounded-xl border border-slate-200 dark:border-slate-600">
                <p class="text-sm text-slate-500 dark:text-slate-400 text-center">
                    Don't have an account?
                    <a href="{{ url_for('auth.register') }}" class="text-blue-600 dark:text-blue-400 font-semibold hover:underline ml-1">Create one →</a>
                </p>
            </div>

            <p class="text-center text-xs text-slate-400 mt-6">Default admin: <code class="bg-slate-100 dark:bg-slate-700 px-1.5 py-0.5 rounded">admin / admin123</code></p>
        </div>
    </div>
</div>
<script>
function toggleDark(){document.documentElement.classList.toggle('dark');localStorage.setItem('theme',document.documentElement.classList.contains('dark')?'dark':'light')}
(function(){const t=localStorage.getItem('theme');if(t==='dark'||(!t&&window.matchMedia('(prefers-color-scheme: dark)').matches))document.documentElement.classList.add('dark')})();
function togglePw(){const p=document.getElementById('pw'),e=document.getElementById('pw-eye');p.type=p.type==='password'?'text':'password';e.className=p.type==='password'?'fa-solid fa-eye':'fa-solid fa-eye-slash'}
</script>
</body>
</html>
